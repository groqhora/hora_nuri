name: Build NURI EXE - Optimized

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'  # Weekly build on Sunday
permissions:
  contents: write
env:
  PYTHON_VERSION: '3.11'
  PYINSTALLER_VERSION: '6.10.0'

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        
    - name: 🛠️ Build EXE with PyInstaller
      run: |
        python -m PyInstaller gui.py `
          --name=NURI `
          --onefile `
          --windowed `
          --hidden-import=PyQt5.QtCore `
          --hidden-import=PyQt5.QtGui `
          --hidden-import=PyQt5.QtWidgets `
          --hidden-import=aiogram `
          --hidden-import=aiohttp `
          --hidden-import=groq `
          --hidden-import=pydantic `
          --hidden-import=edge_tts `
          --hidden-import=yt_dlp `
          --hidden-import=feedparser `
          --hidden-import=google.generativeai `
          --collect-all=PyQt5 `
          --collect-all=aiogram `
          --collect-all=aiohttp `
          --collect-all=groq `
          --collect-all=pydantic `
          --collect-all=edge_tts `
          --collect-all=yt_dlp `
          --collect-all=feedparser `
          --add-data=".env.example;." `
          --distpath=dist `
          --specpath=. `
          --noconfirm `
          --noupx `
          -w
    
    - name: ✅ Verify build output
      run: |
        if (Test-Path "dist/NURI.exe") {
          Write-Host "✅ NURI.exe muvaffaqiyatli yaratildi!" -ForegroundColor Green
          $size = [math]::Round((Get-Item "dist/NURI.exe").Length/1MB, 2)
          Write-Host "📦 Hajmi: $size MB" -ForegroundColor Green
          Write-Host "📍 Path: $(Get-Item "dist/NURI.exe" | Select-Object FullName)" -ForegroundColor Green
        } else {
          Write-Host "❌ EXE yaratilmadi!" -ForegroundColor Red
          exit 1
        }
    
    - name: 📝 Create Release Notes
      id: release_notes
      run: |
        $date = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
        $commit = "${{ github.sha }}".Substring(0, 7)
        Write-Output "date=$date" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        Write-Output "commit=$commit" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
    
    - name: 📤 Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: NURI-EXE-${{ runner.os }}
        path: dist/NURI.exe
        retention-days: 90
        compression-level: 0
    
    - name: 🏷️ Create Release
      if: success() && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/NURI.exe
        tag_name: v${{ github.run_number }}
        release_name: NURI EXE Build #${{ github.run_number }}
        body: |
          ## 🎉 NURI Standalone EXE
          
          **Build:** ${{ steps.release_notes.outputs.date }}
          **Commit:** ${{ steps.release_notes.outputs.commit }}
          
          ### 📥 Yuklab olish
          Pastda `NURI.exe` ni yuklab oling va ishga tushiring.
          
          ### ⚙️ Konfiguratsiya
          `.env` faylini yarating yoki `.env.example` dan nusxa oling:
          
          ```env
          ADMIN_PASSWORD=darling
          GROQ_API_KEY=your_groq_key_here
          GEMINI_API_KEY=your_gemini_key_here
          TELEGRAM_BOT_TOKEN=your_telegram_token
          TELEGRAM_CHAT_ID=your_chat_id
          ```
          
          ### 🚀 Ishga Tushirish
          ```bash
          NURI.exe
          ```
          
          ### ✨ Asosiy Xususiyatlar
          - 🤖 **AI Engine** - Groq & Google Gemini
          - 🎤 **Voice Support** - Edge-TTS text-to-speech
          - 💬 **Telegram Bot** - Full integration
          - 🔐 **Security** - Admin & User authentication
          - 📚 **Memory** - Conversation history
          - 🔌 **Plugins** - Custom extensions support
          
          ### 🔑 Default Credentials
          - **Admin Password:** `darling`
          - ⚠️ `.env` faylida parolni o'zgartiring!
          
          ---
          **Muallif:** [@groqhora](https://github.com/groqhora)
          
        draft: false
        prerelease: false
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 💥 Cleanup build artifacts
      if: always()
      run: |
        Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
        Write-Host "🧹 Build cache tozalandi"
